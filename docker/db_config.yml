# =============================================================================
# db_config.yml – Query & filter configuration for the Chiron RAG database.
# This file is read by fetch.py to build the PubMed/PMC search query.
# =============================================================================

data_selection:
  # -------------------------------------------------------------------------
  # 2. 1. TIME PERIOD – publication date range [DP]
  # -------------------------------------------------------------------------
  time_period: "2015:2026"

  # -------------------------------------------------------------------------
  # 2. KEYWORDS – searched in Title & Abstract [TIAB]
  # -------------------------------------------------------------------------
  keywords:
    # Terms that MUST appear in every paper
    must_contain:
      - "diabetes"

    # OR‑groups: at least one term from each group must match
    or_groups:
      # Group A – clinical & therapeutic aspects
      - - "complications"
        - "management"
        - "therapy"
        - "treatment"
        - "clinical"
        - "risk"

      # Group B – study design & population
      - - "patients"
        - "population"
        - "cohort"
        - "data"
        - "study"
        - "trials"

    # Terms that must NOT appear
    must_not_contain:
      - "in vitro"
      - "animal model"

  # -------------------------------------------------------------------------
  # 3. JOURNALS – searched in Journal Title [TA]
  # -------------------------------------------------------------------------
  journals:
    must_contain: []
    or_groups:
      - - "PLOS ONE"
        - "Scientific Reports"
        - "BMJ Open"
        - "Diabetes Care"
        - "Diabetologia"
        - "Diabetes"
        - "Frontiers in Endocrinology"
        - "BMC Medicine"
        - "Nature Communications"
    must_not_contain: []

  # -------------------------------------------------------------------------
  # 4. MESH SUBJECTS – searched in MeSH Headings [MH]
  # -------------------------------------------------------------------------
  mesh_subjects:
    must_contain: []
    or_groups: []
    must_not_contain: []