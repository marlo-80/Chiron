services:
  # =============================================================================
  # Chiron – core RAG builder (extraction, chunking, embedding, FAISS, eval)
  # =============================================================================
  chiron:
    container_name: Chiron
    # GPU & IPC settings required for CUDA acceleration
    ipc: host
    privileged: true  
    build:
      context: .
      dockerfile: dockerfile  
    ports:
      - "9099:9099"
    volumes:
      - ../data/database:/data/database
      - ../data/chunks:/data/chunks
      - ../data/embeddings:/data/embeddings
      - ../data/faiss:/data/faiss
      - ../data/evaluation:/data/evaluation
      - ../data/dtd/JATS-Archiving-1-3-MathML3-DTD:/dtd:ro
      - ../data/golden_data:/data/golden_data:ro
      - ../data/hf_cache:/root/.cache/huggingface
      - ./src:/app/src
      - ./src/chiron_pipeline.py:/app/pipelines/chiron_pipeline.py
      - ./db_config.yml:/app/db_config.yml
    environment:
      - DTD_DIR=/dtd
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - RESET_PIPELINES_DIR=true
      - NCBI_EMAIL=your.email@example.com 
      - DB_CONFIG_PATH=/app/db_config.yml
      - HOST_OUTPUT_DIR=../data/database
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]


  # =============================================================================
  # OLLAMA - LLM provider
  # =============================================================================
  ollama:
    container_name: Ollama
    # GPU & IPC settings required for CUDA acceleration  
    ipc: host
    privileged: true
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - 'OLLAMA_CONFIG={"debug":false}'
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]

  # =============================================================================
  # OPENWEBUI - browser frontend for ollama
  # =============================================================================
  openwebui:
    container_name: OpenWebUI
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_ADMIN_EMAIL=admin@admin.com
      - WEBUI_ADMIN_PASSWORD=admin
      - WEBUI_SECRET_KEY=very:long_arbitrary_string_with_extra_numbers
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://chiron:9099
      - OPENAI_API_KEY=0p3n-w3bu!
      - PIPELINES_URLS=http://chiron:9099
    depends_on:
      - ollama
      - chiron

volumes:
  ollama_data:
  openwebui_data:
