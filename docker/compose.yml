services:
  chiron:
    container_name: Chiron
    ipc: host
    privileged: true  
    build:
      context: .
      dockerfile: dockerfile  
    ports:
      - "9099:9099"
    volumes:
      - ../data/1_papers_xml:/data/1_papers_xml 
      - ../data/database:/data/database
      - ../data/chunks:/data/chunks
      - ../data/embeddings:/data/embeddings
      - ../data/faiss:/data/faiss
      - ../data/evaluation:/data/evaluation
      - ../data/dtd/JATS-Archiving-1-3-MathML3-DTD:/dtd:ro
      - ../data/golden_data:/data/golden_data:ro
      - ../data/hf_cache:/root/.cache/huggingface
      - ./scripts:/scripts
      - ./src:/app/src
      - ./src/chiron_pipeline.py:/app/pipelines/chiron_pipeline.py
      - ./db_config.yml:/app/db_config.yml


    environment:
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
      - DTD_DIR=/dtd
      - STEP=1
      - MAX_ARTICLES=9931
      - MIN_KEYWORDS=5
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # 🚨 DIESE ZEILE ERGÄNZEN: Zwingt das Framework, Caches bei jedem Booten zu vernichten!
      - RESET_PIPELINES_DIR=true
      - NCBI_EMAIL=your.email@example.com 
      - DB_CONFIG_PATH=/app/db_config.yml
      - HOST_OUTPUT_DIR=../data/database
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]


  ollama:
    ipc: host
    privileged: true  # 🚨 SICHERHEITSHALBER DRIN LASSEN
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - 'OLLAMA_CONFIG={"debug":false}'
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_ADMIN_EMAIL=admin@admin.com
      - WEBUI_ADMIN_PASSWORD=admin
      - WEBUI_SECRET_KEY=ein_sehr_langer_zufaelliger_geheimer_string
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://chiron:9099
      - OPENAI_API_KEY=0p3n-w3bu!
    depends_on:
      - ollama
      - chiron

volumes:
  ollama_data:
  openwebui_data:
