services:
  extractor:
    container_name: Mimir
    build:
      context: .
      dockerfile: dockerfile  
    volumes:
      - ../data/1_paper_tars:/data/input:ro
      - ../data/2_finished_dataframes:/data/output
      - ../data/dtd/JATS-Archiving-1-3-MathML3-DTD:/dtd:ro
      - ./src:/app               # Live-mounted code folder
    environment:
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
      - DTD_DIR=/dtd
      - STEP=1
      - MAX_ARTICLES=9931        # 0 = all
      - MIN_KEYWORDS=5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /mnt/Fastdata/docker_ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Open WebUI – Frontend
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
  openwebui_data: